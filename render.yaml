services:
  - type: web
    name: aws-simulator
    env: python
    plan: free
    runtime: python-3.11
    
    # Directory dove si trova l'app Reflex
    workingDirectory: reflex_app
    
    # Build command - Installa dipendenze (reflex run compila tutto)
    buildCommand: |
      pip install --upgrade pip setuptools wheel &&
      pip install -r ../requirements.txt
    
    # Start command - Lancia l'app completa Reflex in production
    startCommand: cd reflex_app && reflex run --env prod --frontend-only false
    
    # Expose port 8000 (default di Reflex)
    port: 8000
    
    # Environment variables
    envVars:
      - key: REFLEX_ENV
        value: prod
      - key: REFLEX_VAR_OPENING_TAG
        value: "{{"
      - key: REFLEX_VAR_CLOSING_TAG
        value: "}}"
      - key: PYTHONUNBUFFERED
        value: "1"

